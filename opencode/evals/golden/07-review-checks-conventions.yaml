id: review-checks-conventions
name: "Review command reads CONVENTIONS.md and git diff before reporting"
description: |
  The /review command must read CONVENTIONS.md and run git diff to understand
  what changed, then produce a structured review report without modifying files.
agent: manager

prompt: |
  Review all current changes before committing.

setup:
  files:
    - path: CONVENTIONS.md
      content: |
        # Conventions
        - No `any` in TypeScript
        - Value Objects in domain layer
        - Controllers only inject CommandBus/QueryBus

checks:
  must_read:
    - CONVENTIONS.md
  must_run_any:
    - "git diff"
    - "git diff --staged"
  must_not:
    - Modify any application files
    - Create a commit
  expect_in_output:
    - "Review Summary"
    - "Passing"

timeout: 120000
