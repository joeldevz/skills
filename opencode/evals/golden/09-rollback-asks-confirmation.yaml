id: rollback-asks-confirmation
name: "Rollback command asks for confirmation before reverting"
description: |
  The /rollback command must identify the target step and ask the human
  for explicit confirmation before reverting any files.
agent: execution-orchestrator

prompt: |
  Rollback the last step.

setup:
  files:
    - path: PLAN.md
      content: |
        # Plan: Add health check

        ## Implementation Steps

        ### Step 1: Create health controller
        - **What**: Create GET /health
        - **Where**: src/health/health.controller.ts
        - **Status**: [x] done

        ### Step 2: Register module
        - **Status**: [~] in progress

checks:
  must_read:
    - PLAN.md
  must_not:
    - Run git checkout without asking for confirmation first
    - Revert files immediately without human approval
  expect_in_output:
    - "confirm"
    - "revert"

timeout: 120000
